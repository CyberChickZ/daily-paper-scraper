    - PhysPT
    - "physics loss"
    - "analytical physics"
    - LARP
    - "learned physics"
    - "physics prior"
    - "muscle simulation"
    - "musculoskeletal"
    - MuscleMimic

    # === Line 4: Mamba / SSM (temporal architecture) ===
    - Mamba
    - Mamba2
    - "state space model"
    - "selective state space"
    - PS-Mamba
    - BiMamba
    - "graph mamba"
    - "vision mamba"
    - "temporal mamba"

    # === Line 5: 3D Vision Foundation (camera, depth, scene) ===
    - VGGT
    - "camera pose estimation"
    - "structure from motion"
    - "monocular depth"
    - "multi-view reconstruction"
    - "3D reconstruction"
    - DUSt3R

    # === Specific people & systems ===
    - "Karen Liu"
    - SMPLSim
    - "cloth simulation human"
    - "Fast SAM"
  max_results_per_category: 200

huggingface:
  enabled: true
  api_url: "https://huggingface.co/api/daily_papers"

notion:
  # Token and DB ID loaded from .env or environment variables
  token: ""
  database_id: ""

pipeline:
  min_keyword_score: 1
  hf_always_include: false
  lookback_days: 2
