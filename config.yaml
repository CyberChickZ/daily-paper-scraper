arxiv:
  categories:
    - cs.CV
    - cs.GR
    - cs.RO
  # Keyword matching uses word boundaries (case-insensitive). Phrases with the
  # word "human" or specific method/system acronyms tend to be high-precision.
  # Generic terms like "3D reconstruction" or "Mamba" are intentionally NOT
  # included because they collide with unrelated CV/NLP papers.
  keywords:
    # === Line 1: Body Models & Mesh Recovery ===
    - SMPL
    - SMPL-X
    - "mesh recovery"
    - "human mesh"
    - "human body model"
    - "parametric human"
    - "parametric body"
    - "body reconstruction"
    - "neural human"
    - "implicit human"
    - "expressive body"
    - "whole-body human"
    # HMR-family systems
    - "SAM 3D Body"
    - HMR
    - HSMR
    - TokenHMR
    - "4DHumans"
    - "Humans in 4D"
    # Biomechanical
    - "biomechanical body"
    - "skeletal human"
    - "de Leva"
    - "segment inertia"
    - "musculoskeletal body"

    # === Line 2: HPE / Pose / World Coordinates ===
    - "human pose"
    - "human shape estimation"
    - "hand pose"
    - "head pose"
    - WHAM
    - GVHMR
    - "world coordinate"
    - "global trajectory"
    - "camera-to-world"
    - "gravity-view"
    - IPMAN
    - "center of pressure"
    - "ground contact"
    - "foot contact"
    - "monocular human"
    - "video human pose"

    # === Line 3: Motion & Physics ===
    - "human motion"
    - "motion generation"
    - "motion synthesis"
    - "motion capture"
    - "motion diffusion"
    - "character animation"
    - "motion prior"
    - "physics-based character"
    - "physics-based humanoid"
    - "physically plausible motion"
    - "differentiable physics"
    - "contact-aware human"
    - "human-object interaction"
    - "human-scene interaction"
    # Physics-informed pose/motion
    - PhysPT
    - LARP
    - "muscle simulation"
    - MuscleMimic
    - "musculoskeletal motion"

    # === Line 4: Mamba / SSM (temporal architecture for HUMAN tasks) ===
    # Note: bare "Mamba" is too generic. We require specific variants tied
    # to vision/temporal/graph use, plus only count if combined with another keyword.
    - PS-Mamba
    - BiMamba
    - "graph mamba"
    - "vision mamba"
    - "temporal mamba"
    - "motion mamba"

    # === Line 5: 3D Vision Foundation (camera, scene — only specific methods) ===
    - VGGT
    - DUSt3R
    - "camera pose estimation"
    - "structure from motion"
    - "multi-view human"

    # === Specific people & systems ===
    - "Karen Liu"
    - SMPLSim
  max_results_per_category: 200

huggingface:
  enabled: true
  api_url: "https://huggingface.co/api/daily_papers"

notion:
  # Token and DB ID loaded from .env or environment variables
  token: ""
  database_id: ""

pipeline:
  # Require >=2 keyword matches to filter out incidental single-token collisions
  # (e.g. "human pose" mentioned in passing in a surgical robotics paper).
  min_keyword_score: 2
  hf_always_include: false
  lookback_days: 2
