    - "SAM 3D Body"
    - HMR
    - HSMR
    - TokenHMR
    - "4DHumans"
    # Biomechanical body
    - SKEL
    - "biomechanical body"
    - "skeletal model"
    - "de Leva"
    - "segment inertia"
    - "body segment"

    # === Line 2: HPE / Pose / World Coordinates ===
    - "human pose"
    - "pose estimation"
    - "shape estimation"
    - "hand pose"
    - WHAM
    - GVHMR
    - "world coordinate"
    - "global trajectory"
    - "camera-to-world"
    - "gravity-view"
    - "visual odometry"
    - IPMAN
    - "center of pressure"
    - "center of mass"
    - "ground contact"
    - "foot contact"
    - "monocular human"
    - "video human pose"

    # === Line 3: Motion & Physics ===
    - "human motion"
    - "motion generation"
    - "motion synthesis"
    - "motion capture"
    - "motion diffusion"
    - "character animation"
    - "motion prior"
    - "physics-based character"
    - "physics-based humanoid"
    - "physically plausible"
    - "differentiable physics"
    - "contact-aware human"
    - "human-object interaction"
